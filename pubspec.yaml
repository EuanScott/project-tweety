name: project_tweety
description: "A playground app to try out ideas that we aren't implementing at work or I would like to implement at work."
publish_to: 'none'

version: 0.2.0

environment:
  sdk: ">=3.8.1 <4.0.0"
  flutter: ">=3.38.5"

dependencies:
  design_system:
    path: packages/design_system
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  bloc: ^9.0.0
  equatable: ^2.0.0
  flutter_bloc: ^9.0.0
  flutter_inappwebview: ^6.1.5
  freezed_annotation: ^3.1.0
  get_it: ^9.2.0
  http: ^1.0.0
  injectable: ^2.7.1
  intl: ^0.20.2
  shared_preferences: ^2.5.5

dev_dependencies:
  build_runner: ^2.10.5
  bloc_test: ^10.0.0
  injectable_generator: ^2.9.0
  flutter_gen_runner: ^5.12.0
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.3
  test: any
#  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true

